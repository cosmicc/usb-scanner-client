name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish as a release.
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish framework-dependent app
        run: >
          dotnet publish .\UsbScannerClient.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o .\artifacts\publish

      - name: Stage release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\artifacts\release | Out-Null
          Copy-Item .\artifacts\publish\UsbScannerClient.exe .\artifacts\release\UsbScannerClient.exe

      - name: Publish release with exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: USB Scanner Client ${{ steps.release.outputs.tag }}
        run: |
          $notesPath = ".\artifacts\release\release-notes.md"
          $notes = @"
          USB Scanner Client $env:RELEASE_TAG

          This release includes the framework-dependent Windows executable.
          Install the .NET 10 Desktop Runtime before running UsbScannerClient.exe:
          https://dotnet.microsoft.com/en-us/download/dotnet/10.0
          "@
          Set-Content -Path $notesPath -Value $notes -Encoding UTF8

          gh release create "$env:RELEASE_TAG" `
            ".\artifacts\release\UsbScannerClient.exe" `
            --repo "$env:GITHUB_REPOSITORY" `
            --title "$env:RELEASE_TITLE" `
            --notes-file "$notesPath" `
            --draft `
            --verify-tag

          gh release edit "$env:RELEASE_TAG" `
            --repo "$env:GITHUB_REPOSITORY" `
            --draft=false `
            --latest
